<!doctype html>
<html lang="en" suppressHydrationWarning>
  <head>
    <meta charset="UTF-8" />
    <!-- Theme bootstrap: set light/dark before styles load -->
    <script>
      (function() {
        try {
          var stored = localStorage.getItem('spacilly-theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var theme = stored || (prefersDark ? 'dark' : 'light');
          document.documentElement.setAttribute('data-theme', theme);
          document.documentElement.classList.toggle('dark', theme === 'dark');
          document.documentElement.style.colorScheme = theme;
        } catch(e) {}
      })();
    </script>
    <link rel="icon" type="image/jpeg" href="/logo.jpg" />
    <link rel="apple-touch-icon" href="/logo.jpg" sizes="180x180" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="application-name" content="Spacilly" />
    <meta name="apple-mobile-web-app-title" content="Spacilly" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <!-- PWA: prevent unwanted phone/email/address auto-detection -->
    <meta name="format-detection" content="telephone=no, email=no, address=no" />
    <!-- Hint Chromium to allow window-controls-overlay in installed builds -->
    <meta name="theme-color" content="#0f172a" />
    <meta name="msapplication-TileColor" content="#111827" />
    <meta name="msapplication-config" content="/browserconfig.xml" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="color-scheme" content="light dark" />
    <!-- Body: Times New Roman (system). Logo: Mea Culpa via /public/Mea_Culpa (see index.css @font-face). -->
    <title>Spacilly — Secure marketplace & escrow-protected checkout</title>
    <meta name="description" content="Shop on Spacilly: verified sellers, escrow-protected payments, global delivery, and buyer support. Discover products, deals, and trusted stores." />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#ffffff" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0f172a" />
    <meta name="robots" content="index,follow,max-image-preview:large,max-snippet:-1,max-video-preview:-1" />
    <meta name="googlebot" content="index,follow,max-image-preview:large,max-snippet:-1,max-video-preview:-1" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Spacilly" />
    <meta property="og:title" content="Spacilly — Secure marketplace" />
    <meta property="og:description" content="Escrow-protected ecommerce with verified sellers and global-friendly checkout." />
    <meta property="og:image" content="https://spacilly.com/logo.jpg" />
    <meta property="og:image:secure_url" content="https://spacilly.com/logo.jpg" />
    <meta property="og:image:type" content="image/jpeg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:url" content="https://spacilly.com/" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:locale:alternate" content="fr_FR" />
    <meta property="og:locale:alternate" content="rw_RW" />
    <meta property="og:locale:alternate" content="sw_KE" />
    <meta property="fb:app_id" content="" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@spacilly" />
    <meta name="twitter:creator" content="@spacilly" />
    <meta name="twitter:title" content="Spacilly — Secure marketplace" />
    <meta name="twitter:description" content="Escrow-protected ecommerce with verified sellers and global-friendly checkout." />
    <meta name="twitter:image" content="https://spacilly.com/logo.jpg" />
  </head>
  <body style="background-color:#f7f7f8;color:#111111;margin:0">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
