# Build React client and deploy to S3 + CloudFront invalidation.
# Required GitHub secrets: see deploy/aws/GITHUB-ACTIONS-SETUP.md
# Skips gracefully if frontend AWS resources are not configured yet.

name: Deploy Frontend (S3 + CloudFront)

on:
  push:
    branches:
      - master
    paths:
      - 'client/**'
      - '.github/workflows/frontend-deploy.yml'
  workflow_dispatch:

concurrency:
  group: spacilly-frontend-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and deploy SPA
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check frontend secrets
        id: check
        run: |
          if [ -z "${{ secrets.S3_FRONTEND_BUCKET }}" ] || [ -z "${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::S3_FRONTEND_BUCKET or CLOUDFRONT_DISTRIBUTION_ID not set — skipping frontend deploy."
            echo "Configure secrets when S3 + CloudFront are ready (see deploy/aws/GITHUB-ACTIONS-SETUP.md)."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        if: steps.check.outputs.configured == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Create production env file
        if: steps.check.outputs.configured == 'true'
        working-directory: client
        run: |
          cat > .env.production <<EOF
          VITE_API_URL=${{ secrets.VITE_API_URL }}
          VITE_SERVER_URL=${{ secrets.VITE_SERVER_URL }}
          VITE_SITE_ORIGIN=${{ secrets.VITE_SITE_ORIGIN }}
          VITE_WORKOS_CLIENT_ID=${{ secrets.VITE_WORKOS_CLIENT_ID }}
          EOF

      - name: Install dependencies
        if: steps.check.outputs.configured == 'true'
        working-directory: client
        run: npm ci

      - name: Build client
        if: steps.check.outputs.configured == 'true'
        working-directory: client
        run: npm run build

      - name: Configure AWS credentials
        if: steps.check.outputs.configured == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Sync to S3
        if: steps.check.outputs.configured == 'true'
        run: |
          aws s3 sync client/dist/ "s3://${{ secrets.S3_FRONTEND_BUCKET }}/" \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html" \
            --exclude "*.html"
          aws s3 sync client/dist/ "s3://${{ secrets.S3_FRONTEND_BUCKET }}/" \
            --cache-control "public,max-age=0,must-revalidate" \
            --exclude "*" \
            --include "*.html"

      - name: Invalidate CloudFront cache
        if: steps.check.outputs.configured == 'true'
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/*"

      - name: Done
        if: steps.check.outputs.configured == 'true'
        run: echo "Frontend deployed to s3://${{ secrets.S3_FRONTEND_BUCKET }}"
