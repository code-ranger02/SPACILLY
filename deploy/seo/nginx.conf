# Spacilly — crawler-aware reverse proxy (nginx)
# Place inside a server { ... } block that fronts the SPA static files.
# Bots → SEO SSR origin (renders real HTML + JSON-LD).
# Humans → SPA shell (try_files / index.html).
#
# Required upstreams:
#   $SEO_SSR_ORIGIN  e.g. seo-ssr.internal:5001
#
# Usage:
#   1. Add the `map` block in http { ... }.
#   2. Include this snippet in the relevant server block.

map $http_user_agent $spacilly_is_bot {
    default 0;
    "~*googlebot"                 1;
    "~*bingbot"                   1;
    "~*duckduckbot"               1;
    "~*yandex(bot|images)"        1;
    "~*baiduspider"               1;
    "~*facebookexternalhit"       1;
    "~*facebot"                   1;
    "~*twitterbot"                1;
    "~*linkedinbot"               1;
    "~*slackbot"                  1;
    "~*discordbot"                1;
    "~*telegrambot"               1;
    "~*whatsapp"                  1;
    "~*pinterest"                 1;
    "~*redditbot"                 1;
    "~*applebot"                  1;
    "~*gptbot"                    1;
    "~*claudebot"                 1;
    "~*perplexitybot"             1;
    "~*chrome-lighthouse"         1;
}

upstream spacilly_seo_ssr {
    server seo-ssr.internal:5001 max_fails=3 fail_timeout=10s;
    keepalive 32;
}

server {
    listen 443 ssl http2;
    server_name spacilly.com www.spacilly.com;

    root /var/www/spacilly-spa;
    index index.html;

    # Static assets — long cache, never proxied to SSR.
    location ~* \.(?:js|mjs|css|map|png|jpg|jpeg|gif|webp|avif|ico|svg|woff2?|ttf|otf|txt|xml|json)$ {
        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # API + uploads — pass through, never proxy to SSR.
    location /api/      { proxy_pass http://spacilly_api; proxy_set_header Host $host; }
    location /uploads/  { proxy_pass http://spacilly_api; proxy_set_header Host $host; }

    # Bot-aware page rendering.
    location / {
        if ($spacilly_is_bot) {
            proxy_pass http://spacilly_seo_ssr;
            break;
        }

        try_files $uri /index.html;
    }

    # Hardened proxy defaults for bot traffic.
    proxy_set_header Host              $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Spacilly-Bot     1;
    proxy_http_version 1.1;
    proxy_read_timeout 20s;

    add_header Vary "User-Agent" always;
    add_header X-Spacilly-SEO "1" always;
}
